<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="tsgo-strict: strict TypeScript, one file at a time">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1b2a49"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3178c6"/>
      <stop offset="55%" stop-color="#6e56cf"/>
      <stop offset="100%" stop-color="#e53935"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="rgba(110,86,207,0.45)"/>
      <stop offset="100%" stop-color="rgba(110,86,207,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark -->
  <g transform="translate(80,80)">
    <rect width="120" height="120" rx="24" fill="url(#accent)"/>
    <text x="60" y="80" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-weight="800" font-size="56" fill="#fff" letter-spacing="-2">ts</text>
    <circle cx="98" cy="24" r="10" fill="#fff"/>
    <circle cx="98" cy="24" r="5" fill="#e53935"/>
  </g>

  <!-- Title -->
  <text x="80" y="320" fill="#ffffff"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="800" font-size="104" letter-spacing="-3">tsgo-strict</text>

  <!-- Tagline -->
  <text x="80" y="390" fill="#c9d1e3"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="500" font-size="40" letter-spacing="-0.5">Strict TypeScript. One file at a time.</text>

  <!-- Badges -->
  <g transform="translate(80,460)" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="24">
    <g>
      <rect width="180" height="52" rx="26" fill="rgba(49,120,198,0.22)" stroke="#3178c6" stroke-width="1.5"/>
      <text x="90" y="34" text-anchor="middle" fill="#9fc3f0">Rust-powered</text>
    </g>
    <g transform="translate(200,0)">
      <rect width="180" height="52" rx="26" fill="rgba(110,86,207,0.22)" stroke="#6e56cf" stroke-width="1.5"/>
      <text x="90" y="34" text-anchor="middle" fill="#c9b8ff">2.48× faster</text>
    </g>
    <g transform="translate(400,0)">
      <rect width="220" height="52" rx="26" fill="rgba(229,57,53,0.20)" stroke="#e53935" stroke-width="1.5"/>
      <text x="110" y="34" text-anchor="middle" fill="#ffb3b1">strict, incrementally</text>
    </g>
  </g>

  <!-- Footer url -->
  <text x="80" y="590" fill="#7d8aa6"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="24">github.com/ashley-hunter/tsgo-strict-plugin</text>
</svg>
