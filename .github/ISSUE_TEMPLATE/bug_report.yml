name: Bug report
description: Report a reproducible problem with tsgo-strict
title: 'bug: '
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps, command, and config
      placeholder: |
        1. Run: ...
        2. Observe: ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tsgo-strict version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 20.x
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 14 / Ubuntu 24.04 / Windows 11
    validations:
      required: true
