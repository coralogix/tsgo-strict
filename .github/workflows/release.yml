name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.triple }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
            bin_ext: ''
          - triple: linux-x64-musl
            target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
            bin_ext: ''
          - triple: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
            bin_ext: ''
          - triple: darwin-x64
            target: x86_64-apple-darwin
            runner: macos-13
            cross: false
            bin_ext: ''
          - triple: darwin-arm64
            target: aarch64-apple-darwin
            runner: macos-14
            cross: false
            bin_ext: ''
          - triple: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
            bin_ext: '.exe'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: '!matrix.cross'
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} -p tsgo-strict

      - name: Build (cross)
        if: matrix.cross
        shell: bash
        run: cross build --release --target ${{ matrix.target }} -p tsgo-strict

      - name: Stage binary into platform package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p npm/platforms/${{ matrix.triple }}/bin
          cp "target/${{ matrix.target }}/release/tsgo-strict${{ matrix.bin_ext }}" \
             "npm/platforms/${{ matrix.triple }}/bin/tsgo-strict${{ matrix.bin_ext }}"

      - name: Upload platform package artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-${{ matrix.triple }}
          path: npm/platforms/${{ matrix.triple }}/
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: platform-*
          path: npm/platforms/
          merge-multiple: false

      - name: Flatten artifact layout
        shell: bash
        run: |
          set -euo pipefail
          for d in npm/platforms/platform-*; do
            triple="${d#npm/platforms/platform-}"
            rm -rf "npm/platforms/${triple}"
            mv "${d}" "npm/platforms/${triple}"
          done
          ls -la npm/platforms/
          for d in npm/platforms/*/; do
            echo "=== ${d} ==="
            ls -la "${d}"
            ls -la "${d}bin/" || true
          done

      - name: Publish platform packages (dry-run)
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          for d in npm/platforms/*/; do
            (cd "$d" && npm publish --access public --provenance --dry-run)
          done
          (cd npm/tsgo-strict && npm publish --access public --provenance --dry-run)

      - name: Publish platform packages
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for d in npm/platforms/*/; do
            (cd "$d" && npm publish --access public --provenance)
          done

      - name: Publish main package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/tsgo-strict && npm publish --access public --provenance
