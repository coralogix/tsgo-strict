name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.triple }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
            bin_ext: ''
            addon_src: libtsgo_strict_napi.so
          - triple: linux-x64-musl
            target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
            bin_ext: ''
            addon_src: libtsgo_strict_napi.so
          - triple: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
            bin_ext: ''
            addon_src: libtsgo_strict_napi.so
          - triple: darwin-x64
            target: x86_64-apple-darwin
            runner: macos-13
            cross: false
            bin_ext: ''
            addon_src: libtsgo_strict_napi.dylib
          - triple: darwin-arm64
            target: aarch64-apple-darwin
            runner: macos-14
            cross: false
            bin_ext: ''
            addon_src: libtsgo_strict_napi.dylib
          - triple: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
            bin_ext: '.exe'
            addon_src: tsgo_strict_napi.dll
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build CLI (native)
        if: '!matrix.cross'
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} -p tsgo-strict

      - name: Build CLI (cross)
        if: matrix.cross
        shell: bash
        run: cross build --release --target ${{ matrix.target }} -p tsgo-strict

      - name: Build N-API addon (native)
        if: '!matrix.cross'
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} -p tsgo-strict-napi

      - name: Build N-API addon (cross)
        if: matrix.cross
        shell: bash
        run: cross build --release --target ${{ matrix.target }} -p tsgo-strict-napi

      - name: Stage binary + addon into platform package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p npm/platforms/${{ matrix.triple }}/bin
          mkdir -p npm/platforms/${{ matrix.triple }}/native
          cp "target/${{ matrix.target }}/release/tsgo-strict${{ matrix.bin_ext }}" \
             "npm/platforms/${{ matrix.triple }}/bin/tsgo-strict${{ matrix.bin_ext }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.addon_src }}" \
             "npm/platforms/${{ matrix.triple }}/native/tsgo-strict.node"

      - name: Upload platform package artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-${{ matrix.triple }}
          path: npm/platforms/${{ matrix.triple }}/
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Trusted publishing: npm exchanges the workflow's GitHub OIDC token for
    # a short-lived publish token at the registry. No NPM_TOKEN secret, no
    # long-lived credential to rotate. Requires the package's "Trusted
    # Publishers" entry on npmjs.com to name this repo + workflow file.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1 (the version that knows how
      # to do the OIDC token exchange). Node 20 ships with npm 10.x, so bump.
      - name: Upgrade npm to a version that supports trusted publishing
        shell: bash
        run: |
          set -euo pipefail
          npm install -g npm@latest
          npm --version

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: platform-*
          path: npm/platforms/
          merge-multiple: false

      - name: Flatten artifact layout
        shell: bash
        run: |
          set -euo pipefail
          for d in npm/platforms/platform-*; do
            triple="${d#npm/platforms/platform-}"
            rm -rf "npm/platforms/${triple}"
            mv "${d}" "npm/platforms/${triple}"
          done
          for d in npm/platforms/*/; do
            echo "=== ${d} ==="
            ls -la "${d}"
            [[ -d "${d}bin" ]]    && ls -la "${d}bin"
            [[ -d "${d}native" ]] && ls -la "${d}native"
          done

      # Derive the version once from the tag (tag-triggered) or input
      # (workflow_dispatch dry-run path) and stamp it into every publishable
      # package.json plus the `workspace:*` optionalDeps in the launcher.
      # `npm publish` does not resolve the pnpm `workspace:` protocol, so
      # without this the published main package is broken at install time.
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            # Dry-run path: use whatever is currently in the launcher
            # package.json. Lets us exercise the publish plumbing from
            # workflow_dispatch without having to pick a real version.
            version="$(node -p "require('./npm/tsgo-strict/package.json').version")"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "resolved version: ${version}"

      - name: Stamp versions into package.json files
        shell: bash
        run: node scripts/stamp-versions.mjs "${{ steps.version.outputs.version }}"

      # Dry-run from `workflow_dispatch` on main, no registry writes. Useful
      # for verifying artifacts + manifests land correctly without cutting
      # a real release.
      - name: Publish all packages (dry-run)
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          for d in npm/platforms/*/; do
            echo "::group::dry-run publish ${d}"
            (cd "$d" && npm publish --access public --provenance --dry-run)
            echo "::endgroup::"
          done
          echo "::group::dry-run publish npm/tsgo-strict"
          (cd npm/tsgo-strict && npm publish --access public --provenance --dry-run)
          echo "::endgroup::"

      # Real publish: platform packages first so `tsgo-strict`'s
      # optionalDependencies resolve on npm by the time the launcher is
      # published. Each `npm publish` performs its own OIDC exchange, so no
      # token is configured anywhere.
      - name: Publish platform packages
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          for d in npm/platforms/*/; do
            echo "::group::publish ${d}"
            (cd "$d" && npm publish --access public --provenance)
            echo "::endgroup::"
          done

      - name: Publish main package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          cd npm/tsgo-strict
          npm publish --access public --provenance
