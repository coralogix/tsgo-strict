name: Release

# Manual release. Pick a bump level and the workflow:
#   1. resolves the next version from the latest `v*` git tag (not from
#      package.json — the in-repo versions are intentionally stale and
#      the tag is authoritative, matching @coralogix/dataprime-parser),
#   2. cross-builds the CLI + N-API addon for all six target triples,
#   3. stamps the new version into every publishable package.json
#      ephemerally in CI (rewriting the launcher's `workspace:*`
#      optionalDeps to concrete pins),
#   4. publishes each package to the public npm registry under the
#      `@coralogix` scope, authenticating via the NPM_TOKEN secret
#      (an npm automation token with publish rights to the scope),
#   5. tags the workflow's source commit `vX.Y.Z` and pushes only the tag.
#
# Nothing is ever pushed to master. The stamped package.json edits are
# discarded when the runner exits; the in-repo versions stay at their
# initial value forever. The git tag is the sole source of truth for
# "what have we released". This sidesteps master's branch-protection
# rules (signed commits + PR-only) without giving the workflow any
# privileged access.
#
# If the publish step fails, nothing is tagged — the runner simply
# exits. If the publish succeeded but the tag push fails, the packages
# are already on npm; re-create the tag from the workflow run's SHA.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      dry_run:
        description: Dry-run (skip npm publish + git push)
        required: false
        type: boolean
        default: false

permissions:
  contents: write

# Only one release may run at a time. Two concurrent dispatches would
# compute the same `next` version from the same tag, and the second
# would fail with "version already exists" on npm. `cancel-in-progress:
# false` lets the first run finish rather than killing it partway.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve next version
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      version: ${{ steps.next.outputs.version }}
      tag: ${{ steps.next.outputs.tag }}
    steps:
      # fetch-depth: 0 is required so git can see previous `v*` tags —
      # we derive the current version from the latest tag, not from
      # the in-repo package.json (which is frozen at its initial value).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: next
        shell: bash
        run: |
          set -euo pipefail
          # Latest strict `vMAJOR.MINOR.PATCH` tag, or v0.0.0 if the repo
          # has never released. The grep filter excludes pre-release tags
          # (e.g. v0.2.0-rc1) that would break the three-segment bump
          # computation below.
          latest_tag=$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          current="${latest_tag#v}"
          current="${current:-0.0.0}"
          bump="${{ inputs.bump }}"
          next=$(node -e "
            const [maj, min, pat] = process.argv[1].split('.').map(Number);
            const bump = process.argv[2];
            if (bump === 'patch') console.log(\`\${maj}.\${min}.\${pat + 1}\`);
            else if (bump === 'minor') console.log(\`\${maj}.\${min + 1}.0\`);
            else if (bump === 'major') console.log(\`\${maj + 1}.0.0\`);
            else { console.error('unknown bump ' + bump); process.exit(1); }
          " "$current" "$bump")
          echo "current: ${current} (from ${latest_tag:-no tag found})"
          echo "bump:    ${bump}"
          echo "next:    ${next}"
          echo "version=${next}" >> "$GITHUB_OUTPUT"
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"
          {
            echo "### Release plan"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Current | \`${current}\` |"
            echo "| Bump | \`${bump}\` |"
            echo "| Next | \`${next}\` |"
            echo "| Tag | \`v${next}\` |"
            echo "| Dry-run | \`${{ inputs.dry_run }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build ${{ matrix.triple }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
            napi: true
            bin_ext: ''
            addon_src: libtsgo_strict_napi.so
          - triple: linux-x64-musl
            target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            cross: true
            napi: false  # musl does not support cdylib
            bin_ext: ''
            addon_src: ''
          - triple: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
            napi: true
            bin_ext: ''
            addon_src: libtsgo_strict_napi.so
          - triple: darwin-arm64
            target: aarch64-apple-darwin
            runner: macos-15
            cross: false
            napi: true
            bin_ext: ''
            addon_src: libtsgo_strict_napi.dylib
          - triple: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
            napi: true
            bin_ext: '.exe'
            addon_src: tsgo_strict_napi.dll
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build CLI (native)
        if: '!matrix.cross'
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} -p tsgo-strict

      - name: Build CLI (cross)
        if: matrix.cross
        shell: bash
        run: cross build --release --target ${{ matrix.target }} -p tsgo-strict

      - name: Build N-API addon (native)
        if: matrix.napi && !matrix.cross
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} -p tsgo-strict-napi

      - name: Build N-API addon (cross)
        if: matrix.napi && matrix.cross
        shell: bash
        run: cross build --release --target ${{ matrix.target }} -p tsgo-strict-napi

      - name: Stage binary + addon into platform package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p npm/platforms/${{ matrix.triple }}/bin
          cp "target/${{ matrix.target }}/release/tsgo-strict${{ matrix.bin_ext }}" \
             "npm/platforms/${{ matrix.triple }}/bin/tsgo-strict${{ matrix.bin_ext }}"
          if [[ "${{ matrix.napi }}" == "true" ]]; then
            mkdir -p npm/platforms/${{ matrix.triple }}/native
            cp "target/${{ matrix.target }}/release/${{ matrix.addon_src }}" \
               "npm/platforms/${{ matrix.triple }}/native/tsgo-strict.node"
          fi

      - name: Upload platform package artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-${{ matrix.triple }}
          path: npm/platforms/${{ matrix.triple }}/
          if-no-files-found: error

  publish:
    name: Publish to npm & tag
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      # Required for `npm publish --provenance` (OIDC-signed provenance).
      id-token: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # `registry-url:` writes the public-npm registry + a `_authToken` line
      # backed by the NODE_AUTH_TOKEN env var set on the publish steps below.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: platform-*
          path: npm/platforms/
          merge-multiple: false

      - name: Flatten artifact layout
        shell: bash
        run: |
          set -euo pipefail
          for d in npm/platforms/platform-*; do
            triple="${d#npm/platforms/platform-}"
            rm -rf "npm/platforms/${triple}"
            mv "${d}" "npm/platforms/${triple}"
          done
          for d in npm/platforms/*/; do
            echo "=== ${d} ==="
            ls -la "${d}"
            [[ -d "${d}bin" ]]    && ls -la "${d}bin"
            [[ -d "${d}native" ]] && ls -la "${d}native"
          done

      # actions/upload-artifact@v4 strips the executable bit, so without
      # this step the binary inside the platform tarball would be 0644
      # and consumers hit EACCES when the launcher spawns it. Restore
      # 0755 here so `npm publish` records it into the tarball.
      - name: Mark platform binaries executable
        shell: bash
        run: |
          set -euo pipefail
          for f in npm/platforms/*/bin/tsgo-strict npm/platforms/*/bin/tsgo-strict.exe; do
            if [[ -f "$f" ]]; then
              chmod 0755 "$f"
              echo "chmod +x $f"
            fi
          done

      # Stamp the resolved version into the launcher + all platform
      # package.json files, and rewrite the launcher's `workspace:*`
      # optionalDependencies to concrete pins. `npm publish` does not resolve
      # the pnpm `workspace:` protocol, so without this the published
      # launcher would install a broken dep tree.
      - name: Stamp versions into package.json files
        shell: bash
        run: node scripts/stamp-versions.mjs "${VERSION}"

      # Dry-run: exercise the pack + manifest path without hitting the
      # registry and without committing/pushing.
      - name: Publish all packages (dry-run)
        if: inputs.dry_run
        shell: bash
        run: |
          set -euo pipefail
          for d in npm/platforms/*/; do
            echo "::group::dry-run publish ${d}"
            (cd "$d" && npm publish --dry-run --loglevel=error --access public)
            echo "::endgroup::"
          done
          echo "::group::dry-run publish npm/tsgo-strict"
          (cd npm/tsgo-strict && npm publish --dry-run --loglevel=error --access public)
          echo "::endgroup::"

      # Real publish. Platform packages first so the launcher's
      # optionalDependencies resolve on the registry by the time it's
      # published. Auth is the NODE_AUTH_TOKEN written into ~/.npmrc by
      # setup-node; `--access public` is required because scoped packages
      # default to restricted.
      - name: Publish platform packages
        if: '!inputs.dry_run'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for d in npm/platforms/*/; do
            echo "::group::publish ${d}"
            (cd "$d" && npm publish --loglevel=error --access public --provenance)
            echo "::endgroup::"
          done

      - name: Publish main package
        if: '!inputs.dry_run'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          cd npm/tsgo-strict
          npm publish --loglevel=error --access public --provenance

      # Tag + push only happens after publish succeeds, so a failed
      # publish leaves the remote tag-less. We deliberately do NOT
      # commit or push to the release branch: master's branch protection
      # (verified signatures, PR-only) would reject it, and it's not
      # needed — the tag is the authoritative record of what was
      # released. Stamped package.json / lockfile edits stay in the
      # runner's ephemeral workspace and disappear with the job.
      #
      # The tag points at GITHUB_SHA (the commit the workflow ran
      # against), not the in-runner HEAD, since nothing was committed.
      - name: Tag release and push tag
        if: '!inputs.dry_run'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}" "${GITHUB_SHA}"
          git push origin "${TAG}"

      - name: Create GitHub Release
        if: '!inputs.dry_run'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes

      - name: Release summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Release ${TAG}"
            echo ""
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              echo "- Mode: **dry-run** (no registry writes, no git push)"
            else
              echo "- Published \`@coralogix/tsgo-strict@${VERSION}\` and 5 \`@coralogix/tsgo-strict-*@${VERSION}\` platform packages to npm"
              echo "- Pushed tag \`${TAG}\` pointing at \`${GITHUB_SHA}\`"
              echo "- Created GitHub Release \`${TAG}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  docs:
    name: Publish docs
    needs: [prepare, publish]
    if: '!inputs.dry_run'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Default checkout (GITHUB_SHA) intentionally — the `publish` job pushes
    # stamped-version commits that desync package.json from pnpm-lock.yaml,
    # which would break `--frozen-lockfile` if we checked out the tag here.
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
